name: Validacion del proyecto web

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validar-estructura:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Comprobar estructura basica
        run: |
          if [ ! -f index.html ]; then echo "Falta index.html"; exit 1; fi
          if [ ! -d css ]; then echo "Falta carpeta css"; exit 1; fi
          if [ ! -f css/style.css ]; then echo "Falta css/style.css"; exit 1; fi
          if [ ! -d primer-trimestre ]; then echo "Falta primer-trimestre"; exit 1; fi
          if [ ! -d segundo-trimestre ]; then echo "Falta segundo-trimestre"; exit 1; fi
          if [ ! -d tercer-trimestre ]; then echo "Falta tercer-trimestre"; exit 1; fi

      - name: Comprobar HTML en trimestres
        run: |
          ls primer-trimestre/*.html >/dev/null 2>&1 || (echo "No hay HTML en primer-trimestre"; exit 1)
          ls segundo-trimestre/*.html >/dev/null 2>&1 || (echo "No hay HTML en segundo-trimestre"; exit 1)
          ls tercer-trimestre/*.html >/dev/null 2>&1 || (echo "No hay HTML en tercer-trimestre"; exit 1)

      - name: OK final
        run: echo "Estructura correcta"